<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windy ライブカメラ一覧（日本）</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f0f4f8;
      color: #333;
    }

    header {
      background: #1a73e8;
      color: white;
      padding: 20px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    header h1 { font-size: 1.4rem; }
    header p { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }

    #stats {
      text-align: center;
      padding: 12px;
      background: #e8f0fe;
      font-size: 0.9rem;
      color: #1a73e8;
    }

    #loading {
      text-align: center;
      padding: 60px;
      font-size: 1.1rem;
      color: #666;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #ddd;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #error {
      display: none;
      text-align: center;
      padding: 40px;
      color: #d32f2f;
      background: #ffebee;
      margin: 20px;
      border-radius: 8px;
    }

    #content { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }

    .region-section { margin-bottom: 36px; }

    .region-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 2px solid #1a73e8;
    }

    .region-name { font-size: 1.2rem; font-weight: bold; color: #1a73e8; }
    .region-count {
      background: #1a73e8;
      color: white;
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 0.8rem;
    }

    .camera-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .camera-card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .camera-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    }

    .camera-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: #e0e0e0;
    }

    .camera-thumb-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #e0e0e0, #bdbdbd);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .camera-info { padding: 10px 12px 12px; }
    .camera-title { font-size: 0.9rem; font-weight: 600; line-height: 1.3; }
    .camera-city { font-size: 0.78rem; color: #888; margin-top: 4px; }

    .camera-status {
      display: inline-block;
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 4px;
      margin-top: 6px;
    }

    .status-active { background: #e8f5e9; color: #2e7d32; }
    .status-inactive { background: #fafafa; color: #999; }

    .nav-btn {
      background: rgba(255,255,255,0.2);
      color: white;
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.35); }
    .nav-btn.active { background: white; color: #1a73e8; font-weight: bold; }
  </style>
</head>
<body>

<header>
  <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
    <div>
      <h1>📷 Windy ライブカメラ一覧</h1>
      <p>関東地方のライブカメラを都道府県ごとに表示</p>
    </div>
    <a href="japan.html" style="background:rgba(255,255,255,0.2); color:white; border:1px solid rgba(255,255,255,0.5); border-radius:20px; padding:6px 16px; text-decoration:none; font-size:0.9rem;">🗾 全国版へ</a>
  </div>
  <div id="nav" style="margin-top:12px; display:flex; flex-wrap:wrap; gap:8px;">
    <button class="nav-btn active" data-region="all" onclick="filterRegion(this)">すべて</button>
  </div>
</header>

<div id="stats"></div>

<div id="loading">
  <div class="spinner"></div>
  カメラ情報を読み込み中...
</div>

<div id="error"></div>
<div id="debug" style="display:none; background:#fff3cd; padding:12px 24px; font-size:0.85rem; color:#664d03; word-break:break-all;"></div>
<div id="content"></div>

<script>
  const API_KEY = 'XDIh55Q9zDB4wjTQlMFgVPaPWkgIbVs7';
  const BASE_URL = 'https://api.windy.com/webcams/api/v3/webcams';

  // 関東7都県の重心座標（緯度・経度）と表示順
  const KANTO = [
    { ja: '東京都',   lat: 35.689, lon: 139.692 },
    { ja: '神奈川県', lat: 35.447, lon: 139.642 },
    { ja: '千葉県',   lat: 35.605, lon: 140.123 },
    { ja: '埼玉県',   lat: 35.857, lon: 139.649 },
    { ja: '茨城県',   lat: 36.341, lon: 140.447 },
    { ja: '栃木県',   lat: 36.566, lon: 139.883 },
    { ja: '群馬県',   lat: 36.391, lon: 139.060 },
  ];

  // 関東全体のバウンディングボックス（範囲外は除外）
  const KANTO_BBOX = { latMin: 34.9, latMax: 37.2, lonMin: 138.4, lonMax: 141.0 };

  function dist2(lat, lon, pref) {
    const dlat = lat - pref.lat;
    const dlon = lon - pref.lon;
    return dlat * dlat + dlon * dlon;
  }

  function toJaPrefecture(lat, lon) {
    if (lat < KANTO_BBOX.latMin || lat > KANTO_BBOX.latMax ||
        lon < KANTO_BBOX.lonMin || lon > KANTO_BBOX.lonMax) return null;
    // 最も近い都県に割り当て
    return KANTO.reduce((best, pref) =>
      dist2(lat, lon, pref) < dist2(lat, lon, best) ? pref : best
    ).ja;
  }

  // 関東中心座標・半径200km
  const KANTO_CENTER = { lat: 36.0, lon: 139.5, radius: 200 };

  async function fetchPage(offset, limit = 50) {
    const params = new URLSearchParams({
      nearby: `${KANTO_CENTER.lat},${KANTO_CENTER.lon},${KANTO_CENTER.radius}`,
      limit,
      offset,
      include: 'location,images',
    });
    const res = await fetch(`${BASE_URL}?${params}`, {
      headers: { 'x-windy-api-key': API_KEY },
    });
    if (!res.ok) {
      const body = await res.text();
      throw new Error(`API エラー ${res.status}: ${body}`);
    }
    return res.json();
  }

  async function fetchAllWebcams() {
    const first = await fetchPage(0);
    const total = first.total;
    let webcams = first.webcams || [];

    const pages = [];
    const maxOffset = Math.min(total, 1000);
    for (let offset = 50; offset < maxOffset; offset += 50) {
      pages.push(fetchPage(offset));
    }
    const results = await Promise.all(pages);
    results.forEach(r => { webcams = webcams.concat(r.webcams || []); });

    return { total, webcams };
  }

  function groupByPrefecture(webcams) {
    const map = {};
    KANTO.forEach(k => { map[k.ja] = []; });

    webcams.forEach(cam => {
      const lat = cam.location?.latitude;
      const lon = cam.location?.longitude;
      if (lat == null || lon == null) return;
      const ja = toJaPrefecture(lat, lon);
      if (ja) map[ja].push(cam);
    });

    return KANTO.map(k => [k.ja, map[k.ja]]).filter(([, cams]) => cams.length > 0);
  }

  function renderCard(cam) {
    const title = cam.title || '名称不明';
    const city = cam.location?.city || '';
    const isActive = cam.status === 'active';
    const thumb = cam.images?.current?.preview || cam.images?.daylight?.preview || '';
    const url = `https://www.windy.com/webcams/${cam.webcamId}`;

    return `
      <a class="camera-card" href="${url}" target="_blank" rel="noopener">
        ${thumb
          ? `<img class="camera-thumb" src="${thumb}" alt="${title}" loading="lazy">`
          : `<div class="camera-thumb-placeholder">📷</div>`}
        <div class="camera-info">
          <div class="camera-title">${title}</div>
          ${city ? `<div class="camera-city">${city}</div>` : ''}
          <span class="camera-status ${isActive ? 'status-active' : 'status-inactive'}">
            ${isActive ? '● ライブ' : '○ 静止画'}
          </span>
        </div>
      </a>`;
  }

  function filterRegion(btn) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const target = btn.dataset.region;
    document.querySelectorAll('.region-section').forEach(sec => {
      sec.style.display = (target === 'all' || sec.dataset.region === target) ? '' : 'none';
    });
  }

  function render(total, grouped) {
    const shown = grouped.reduce((s, [, c]) => s + c.length, 0);
    document.getElementById('stats').textContent =
      `関東地方 ${shown} 件 / 取得総数 ${total} 件`;

    const nav = document.getElementById('nav');
    grouped.forEach(([pref]) => {
      const btn = document.createElement('button');
      btn.className = 'nav-btn';
      btn.dataset.region = pref;
      btn.textContent = pref;
      btn.onclick = () => filterRegion(btn);
      nav.appendChild(btn);
    });

    const content = document.getElementById('content');
    content.innerHTML = grouped.map(([pref, cams]) => `
      <section class="region-section" data-region="${pref}">
        <div class="region-header">
          <span class="region-name">${pref}</span>
          <span class="region-count">${cams.length}件</span>
        </div>
        <div class="camera-grid">
          ${cams.map(renderCard).join('')}
        </div>
      </section>
    `).join('');
  }

  (async () => {
    try {
      const { total, webcams } = await fetchAllWebcams();
      document.getElementById('loading').style.display = 'none';
      const grouped = groupByPrefecture(webcams);
      render(total, grouped);
    } catch (e) {
      document.getElementById('loading').style.display = 'none';
      const err = document.getElementById('error');
      err.style.display = 'block';
      err.textContent = `読み込みに失敗しました: ${e.message}`;
    }
  })();
</script>

</body>
</html>
